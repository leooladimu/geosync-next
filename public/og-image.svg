<svg xmlns="http://www.w3.org/2000/svg" width="630" height="630" viewBox="0 0 630 630">
  <!-- Background -->
  <rect width="630" height="630" fill="#0e0f0f"/>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="630" height="5" fill="#c97d3a"/>
  
  <!-- Earth symbol ♁ (circle with cross on top) -->
  <circle cx="315" cy="170" r="32" fill="none" stroke="#c97d3a" stroke-width="4"/>
  <line x1="315" y1="138" x2="315" y2="105" stroke="#c97d3a" stroke-width="4"/>
  <line x1="295" y1="122" x2="335" y2="122" stroke="#c97d3a" stroke-width="4"/>
  
  <!-- App name -->
  <text x="315" y="270" text-anchor="middle" dominant-baseline="central" font-size="68" fill="#e8e4dc" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">geoSync</text>
  
  <!-- Tagline -->
  <text x="315" y="350" text-anchor="middle" dominant-baseline="central" font-size="20" fill="#9a9590" font-family="Helvetica, Arial, sans-serif">Science-Grounded</text>
  <text x="315" y="380" text-anchor="middle" dominant-baseline="central" font-size="20" fill="#9a9590" font-family="Helvetica, Arial, sans-serif">Relationship Compatibility</text>
  
  <!-- Separator line -->
  <rect x="240" y="420" width="150" height="1" fill="#2a2c2e"/>
  
  <!-- Bottom tagline -->
  <text x="315" y="470" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#5c5854" font-family="Helvetica, Arial, sans-serif">Not astrology — environmental imprinting</text>
  
  <!-- Domain -->
  <text x="315" y="530" text-anchor="middle" dominant-baseline="central" font-size="18" fill="#c97d3a" font-family="Courier, monospace">geosync.oleo.dev</text>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="625" width="630" height="5" fill="#c97d3a"/>
</svg>
